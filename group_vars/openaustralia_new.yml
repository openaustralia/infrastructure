# new server (with production and staging environments) configuration for OpenAustralia
# Most values inherited from openaustralia.yml
site_name: newprod.openaustralia.org.au

# Cron enable/disable switch for staging
cron_enabled: false

# Disable backups for staging
backup_profiles: []
domains_for_certbot:
  - email: contact@oaf.org.au
    domains:
      - "{{ openaustralia_domain }}"
