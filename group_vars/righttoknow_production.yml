# Right to Know Standalone Production Server
# Most values are inherited from the existing righttoknow.yml

# This is currently only used to name things on New Relic.
site_name: prod.righttoknow.org.au

# Configure the stage for this server. This is used to determine which
# tasks are run against this server. For example, the staging server will run the
# "staging" tasks, while the production server will run the "production" tasks.
stage: production

# Domain configuration for standalone production server
righttoknow_domain: righttoknow.org.au # Used in certbot and SSL
domain: righttoknow.org.au # Used in Nginx
server_hostname: prod.righttoknow.org.au # Used in Nginx and certbot

