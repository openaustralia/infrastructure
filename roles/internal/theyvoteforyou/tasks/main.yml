---
- name: Remove apache2
  apt:
    name: apache2
    state: absent

# Based on https://www.phusionpassenger.com/docs/advanced_guides/install_and_upgrade/standalone/install/oss/jammy.html

- name: Add HTTPS support for APT
  tags: passenger
  apt:
    pkg:
      - dirmngr
      - gnupg
      - apt-transport-https
      - ca-certificates
      - curl
    state: present

- name: Add key for passenger
  tags: passenger
  ansible.builtin.get_url:
    url: https://oss-binaries.phusionpassenger.com/auto-software-signing-gpg-key-2025.txt
    dest: /usr/share/keyrings/phusionpassenger-archive-keyring.asc

- name: Add passenger apt repository
  tags: passenger
  apt_repository:
    repo: 'deb [signed-by=/usr/share/keyrings/phusionpassenger-archive-keyring.asc] https://oss-binaries.phusionpassenger.com/apt/passenger {{ ansible_distribution_release }} main'
    state: present
    update_cache: true

- name: Install nginx and passenger packages
  tags: passenger
  apt:
    pkg:
      - libnginx-mod-http-passenger
      - nginx
    state: present

- name: Install memcached
  apt:
    pkg: memcached
    state: present

- name: Install pip
  apt:
    pkg: python3-pip

- name: Install dependency for following command
  pip:
    name: PyMySQL

- name: Create theyvoteforyou databases
  mysql_db:
    login_host: "{{ db_host }}"
    login_user: admin
    login_password: "{{ rds_admin_password }}"
    name: "tvfy-{{ item }}"
  with_items:
    - production
    - staging

- name: Create theyvoteforyou user with access to the database (production)
  mysql_user:
    login_host: "{{ db_host }}"
    login_user: admin
    login_password: "{{ rds_admin_password }}"
    name: tvfy-production
    password: "{{ theyvoteforyou_production_mysql_password }}"
    priv: 'tvfy-production.*:ALL'
    host: "%"

- name: Create mysql 8 user with readonly access to the production theyvoteforyou database for metabase
  mysql_user:
    login_host: "{{ db_host }}"
    login_user: admin
    login_password: "{{ rds_admin_password }}"
    name: tvfy-production-readonly
    password: "{{ mysql_production_password_readonly }}"
    priv: 'tvfy-production.*:SELECT'
    host: "%"
  run_once: true

- name: Create theyvoteforyou user with access to the database (staging)
  mysql_user:
    login_host: "{{ db_host }}"
    login_user: admin
    login_password: "{{ rds_admin_password }}"
    name: tvfy-staging
    password: "{{ theyvoteforyou_staging_mysql_password }}"
    priv: 'tvfy-staging.*:ALL'
    host: "%"

- name: Ensure that deploy owns /srv/www and /srv/www/shared
  file:
    state: directory
    owner: deploy
    group: deploy
    path: '{{ item }}'
    mode: '0755'
  with_items:
    - /srv/www
    - /srv/www/production
    - /srv/www/production/shared
    - /srv/www/production/shared/config
    - /srv/www/production/shared/config/credentials
    - /srv/www/production/shared/public
    - /srv/www/staging
    - /srv/www/staging/shared
    - /srv/www/staging/shared/config
    - /srv/www/staging/shared/config/credentials
    - /srv/www/staging/shared/public

- name: Copy application settings
  copy:
    src: settings-{{ item }}.yml
    dest: "/srv/www/{{ item }}/shared/config/settings.yml"
    owner: deploy
    group: deploy
    mode: '0644'
  with_items:
    - production
    - staging
  notify: nginx reload

- name: Copy application database configuration
  template:
    src: "database-{{ item }}.yml"
    dest: "/srv/www/{{ item }}/shared/config/database.yml"
    owner: deploy
    group: deploy
    mode: '0644'
  with_items:
    - production
    - staging
  notify: nginx reload

- name: Copy rails master key for production
  template:
    src: production.key
    dest: "/srv/www/{{ item }}/shared/config/credentials/production.key"
    owner: deploy
    group: deploy
    mode: '0600'
  with_items:
    - production
    - staging
  notify: nginx reload

- name: Copy application newrelic configuration
  template:
    src: newrelic.yml
    dest: "/srv/www/{{ item }}/shared/config/"
    owner: deploy
    group: deploy
    mode: '0644'
  with_items:
    - production
    - staging
  notify: nginx reload

- name: Copy application skylight.io configuration
  template:
    src: skylight.yml
    dest: "/srv/www/{{ item }}/shared/config/"
    owner: deploy
    group: deploy
    mode: '0644'
  with_items:
    - production
    - staging
  notify: nginx reload

- name: Ensure package to build gem native extensions are installed
  apt:
    pkg: libmysqlclient-dev

# Create fake let's encrypt directories when in development
- name: Create fake let's encrypt directories when in development
  file:
    state: directory
    path: "/etc/letsencrypt/live/{{ item }}"
    mode: '0755'
  with_items:
    - "theyvoteforyou.{{ base_domain }}"
    - "test.theyvoteforyou.{{ base_domain }}"
  when: "'development' in group_names"

# We need to setup the SSL certificates before we try to configure nginx
# because otherwise nginx will try to look for non-existent certificates
- name: Copy SSL certificates for development
  copy:
    src: "{{ item }}.pem"
    # We're faking it as if these are let's encrypt certs. Makes for less magic config
    dest: "/etc/letsencrypt/live/{{ item }}/fullchain.pem"
    mode: "0644"
  with_items:
    - "theyvoteforyou.{{ base_domain }}"
    - "test.theyvoteforyou.{{ base_domain }}"
  # Only run this task when this machine is the development group
  when: "'development' in group_names"
  notify: nginx reload

- name: Copy SSL keys for development
  copy:
    src: "{{ item }}.key"
    dest: "/etc/letsencrypt/live/{{ item }}/privkey.pem"
    mode: "0640"
  with_items:
    - "theyvoteforyou.{{ base_domain }}"
    - "test.theyvoteforyou.{{ base_domain }}"
  # Only run this task when this machine is the development group
  when: "'development' in group_names"
  notify: nginx reload

- name: Install certificate using certbot
  include_role:
    name: oaf.certbot
  vars:
    certbot_certs:
      - email: contact@oaf.org.au
        domains: "{{ production_certbot_domains }}"
      - email: contact@oaf.org.au
        domains: "{{ staging_certbot_domains }}"
  when: "'ec2' in group_names"

- name: Copy test/test password for staging site
  tags: htpasswd
  copy:
    src: htpasswd
    dest: /etc/nginx/
    mode: '0640'
    owner: root
    group: www-data
  notify: nginx restart

- name: Copy nginx main configuration
  copy:
    src: nginx.conf
    dest: /etc/nginx/
    mode: '0644'
  notify: nginx restart

- name: Copy nginx site configuration
  template:
    src: "{{ item }}"
    dest: /etc/nginx/sites-available/
    mode: '0644'
  with_items:
    - default
    - production
    - staging
  notify: nginx reload

- name: Enable sites
  file:
    src: /etc/nginx/sites-available/{{ item }}
    dest: /etc/nginx/sites-enabled/{{ item }}
    state: link
  with_items:
    - default
    - production
    - staging
  notify: nginx reload

- name: Allow deploy user to control application services
  template:
    src: theyvoteforyou_foreman
    dest: /etc/sudoers.d/theyvoteforyou_foreman
    mode: '0440'
    validate: visudo -cf %s
  # notify: sudo reload

- name: Add /usr/local/bin to PATH in cron so that chromedriver can be found
  cron:
    user: deploy
    name: PATH
    env: true
    job: /usr/local/bin:/usr/bin:/bin

- name: Set up daily load cron job
  cron:
    name: theyvoteforyou_application_load_daily
    user: deploy
    hour: "9"
    minute: "15"
    weekday: "1-5"
    job: "cd /srv/www/production/current && /usr/local/bin/bundle exec rake application:load:daily RAILS_ENV=production"
    state: "{{ cron_enabled | ternary('present', 'absent')}}"

- name: Set up nightly cron job
  cron:
    name: theyvoteforyou_application_cron_nightly
    user: deploy
    hour: "2"
    minute: "5"
    job: "cd /srv/www/production/current && /usr/local/bin/bundle exec rake application:cron:nightly RAILS_ENV=production"
    state: "{{ cron_enabled | ternary('present', 'absent')}}"

- name: Install postfix so we can mail out from cron jobs
  apt:
    pkg: postfix

# TODO: Make this mail to different addresses for development/production
- name: Mail output of cron
  cronvar:
    name: MAILTO
    user: deploy
    value: web-administrators@openaustralia.org,j1u3z8i7h9w0q8o4@oaf.slack.com
  when: "'ec2' in group_names"

# The browser and chromedriver used by the card screenshotter come from Chrome for Testing. A single
# manifest entry ships a guaranteed-matched chrome + chromedriver pair, so the two can never drift out
# of sync. We install the latest Stable version and only download again when the version actually
# changes; pinning is a one-line change to chrome_for_testing_channel.

# Chrome for Testing ships only the binaries, so install the shared libraries the browser needs to run
# (these used to be pulled in transitively by the google-chrome-stable deb), plus unzip to extract the
# downloaded archives.
- name: Install Chrome for Testing dependencies
  apt:
    pkg:
      - unzip
      - libasound2
      - libatk-bridge2.0-0
      - libatk1.0-0
      - libatspi2.0-0
      - libcups2
      - libdbus-1-3
      - libdrm2
      - libgbm1
      - libgtk-3-0
      - libnspr4
      - libnss3
      - libpango-1.0-0
      - libxcomposite1
      - libxdamage1
      - libxfixes3
      - libxkbcommon0
      - libxrandr2
      - libxshmfence1
      - libxss1
      - libvulkan1
      - fonts-liberation
      - libu2f-udev

# check_mode: false so the read-only manifest fetch still runs during --check; the tasks below depend on
# the version it resolves.
- name: Get Chrome for Testing manifest
  uri:
    url: "{{ chrome_for_testing_manifest_url }}"
    return_content: true
  register: chrome_for_testing_manifest
  check_mode: false

- name: Resolve Chrome for Testing version and download URLs
  set_fact:
    chrome_for_testing_version: "{{ channel.version }}"
    chrome_for_testing_chrome_url: "{{ (channel.downloads.chrome | selectattr('platform', 'equalto', 'linux64') | first).url }}"
    chrome_for_testing_chromedriver_url: "{{ (channel.downloads.chromedriver | selectattr('platform', 'equalto', 'linux64') | first).url }}"
  vars:
    channel: "{{ chrome_for_testing_manifest.json.channels[chrome_for_testing_channel] }}"

- name: Create Chrome for Testing version directory
  file:
    path: "{{ chrome_for_testing_install_dir }}/{{ chrome_for_testing_version }}"
    state: directory
    mode: "0755"

# creates: makes this idempotent - we only download and extract when this exact version isn't installed.
# Skipped in check mode: the version directory above isn't actually created then, and unarchive requires
# an existing dest.
- name: Download and extract Chrome for Testing browser
  unarchive:
    src: "{{ chrome_for_testing_chrome_url }}"
    dest: "{{ chrome_for_testing_install_dir }}/{{ chrome_for_testing_version }}"
    remote_src: true
    creates: "{{ chrome_for_testing_install_dir }}/{{ chrome_for_testing_version }}/chrome-linux64/chrome"
  when: not ansible_check_mode

- name: Download and extract matching chromedriver
  unarchive:
    src: "{{ chrome_for_testing_chromedriver_url }}"
    dest: "{{ chrome_for_testing_install_dir }}/{{ chrome_for_testing_version }}"
    remote_src: true
    creates: "{{ chrome_for_testing_install_dir }}/{{ chrome_for_testing_version }}/chromedriver-linux64/chromedriver"
  when: not ansible_check_mode

# The card screenshotter relies on Selenium's default discovery, which finds google-chrome and
# chromedriver on PATH. /usr/local/bin is on PATH (including cron, see above) and precedes /usr/bin.
# force: true replaces the legacy chromedriver binary that the previous approach left in /usr/local/bin.
- name: Symlink Chrome for Testing browser onto PATH
  file:
    state: link
    src: "{{ chrome_for_testing_install_dir }}/{{ chrome_for_testing_version }}/chrome-linux64/chrome"
    dest: /usr/local/bin/google-chrome
    force: true

- name: Symlink matching chromedriver onto PATH
  file:
    state: link
    src: "{{ chrome_for_testing_install_dir }}/{{ chrome_for_testing_version }}/chromedriver-linux64/chromedriver"
    dest: /usr/local/bin/chromedriver
    force: true

# Remove the previous apt-managed Chrome. Earlier deploys installed google-chrome-stable from Google's
# apt repo; it auto-updated via its own daily cron and its apt source reappeared on every run, causing
# persistent config drift. Chrome for Testing (above) fully replaces it. autoremove is disabled so the
# shared libraries installed above are kept. Removing the package also removes its own
# /etc/cron.daily/google-chrome auto-update job and /etc/default/google-chrome.
- name: Remove apt-managed google-chrome-stable
  apt:
    pkg: google-chrome-stable
    state: absent
    autoremove: false

- name: Remove the Google Chrome apt repository
  apt_repository:
    repo: "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main"
    state: absent

- name: Remove Chrome's self-added apt source
  file:
    path: /etc/apt/sources.list.d/google-chrome.list
    state: absent

- name: Remove the Google apt signing key
  apt_key:
    id: EB4C1BFD4F042F6DDDCCEC917721F63BD38B4796
    state: absent

# We want this directory to exist in development too so that
# things are as consistent as possible
- name: Create data mountpoint
  file:
    state: directory
    path: /data
    mode: '0755'

# On EC2 we're using a seperate EBS volume to hold application data
- name: Create filesystem on attached block storage
  filesystem:
    fstype: ext4
    dev: /dev/nvme1n1
  when: "'ec2' in group_names"

- name: Mount /data filesystem
  mount:
    path: /data
    # Mount device by UUID because that's needed to run on AWS Nitro based instances (e.g. t3)
    # See https://aws.amazon.com/premiumsupport/knowledge-center/boot-error-linux-nitro-instance/
    src: "UUID={{ ansible_facts['devices']['nvme1n1']['links']['uuids'][0] }}"
    fstype: ext4
    state: mounted
  when: "'ec2' in group_names"

- name: Create directories in /data
  file:
    path: "/data/{{ item[0] }}/{{ item[1] }}"
    owner: deploy
    group: deploy
    state: directory
    mode: '0755'
  with_nested:
    - "{{ environments }}"
    - ['public', 'public/cards']

- name: Link directories in /srv/www to /data
  file:
    state: link
    src: "/data/{{ item[0] }}/{{ item[1] }}"
    dest: "/srv/www/{{ item[0] }}/shared/{{ item[1] }}"
  with_nested:
    - "{{ environments }}"
    - ['public/cards']
