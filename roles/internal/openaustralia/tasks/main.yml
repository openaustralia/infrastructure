---
# We want this directory to exist in development too so that
# things are as consistent as possible
# Basically everything in /data is stuff we want backed up that
# isn't the database
- name: Create data mountpoint
  file:
    state: directory
    path: /data
    mode: '0755'

- name: Debug devices list in ansible_facts
  debug:
    var: ansible_facts['devices']

# On EC2 we're using a separate EBS volume to hold application data
- name: Create filesystem on attached block storage
  filesystem:
    fstype: ext4
    dev: /dev/nvme1n1
  when:
    - "'ec2' in group_names"
    - "'nvme1n1' in ansible_facts['devices']"
    - ansible_facts['devices']['nvme1n1']['partitions'] | length == 0

- name: Mount /data filesystem
  # Use SKIP_TAGS=mount_data to get past this point when checking
  tags: mount_data
  mount:
    path: /data
    # Mount device by UUID because that's needed to run on AWS Nitro based instances (e.g. t3)
    # See https://aws.amazon.com/premiumsupport/knowledge-center/boot-error-linux-nitro-instance/
    src: "UUID={{ ansible_facts['devices']['nvme1n1']['links']['uuids'][0] }}"
    fstype: ext4
    state: mounted
  when:
  - "'ec2' in group_names"
  - "'nvme1n1' in ansible_facts['devices']"
  - "ansible_facts['devices']['nvme1n1']['links']['uuids'] | length > 0"

- name: Create directories in /data
  file:
    path: "/data/{{ item[0] }}/{{ item[1] }}"
    owner: deploy
    group: deploy
    state: directory
    mode: '0755'
  with_nested:
    - "{{ environments }}"
    - ['images/mps', 'images/mpsL', 'images/mpsXL', 'pwdata', 'html_cache', 'regmem_scan', 'regmem_scan_old', 'search/searchdb']

- name: Ensure that directories in /srv/www exist
  file:
    path: "/srv/www/{{ item[0] }}/{{ item[1] }}"
    owner: deploy
    group: deploy
    state: directory
    mode: '0755'
  with_nested:
    - "{{ environments }}"
    - ['log', 'releases', 'shared/config', 'shared/rss/mp', 'shared/sitemaps']

- name: Link directories in /srv/www to /data
  file:
    state: link
    src: "/data/{{ item[0] }}/{{ item[1] }}"
    dest: "/srv/www/{{ item[0] }}/shared/{{ item[1] }}"
  with_nested:
    - "{{ environments }}"
    - ['images', 'pwdata', 'html_cache', 'regmem_scan', 'regmem_scan_old', 'search']

- name: Link file alerts-lastsent in /srv/www to /data
  file:
    state: link
    src: "/data/{{ item }}/alerts-lastsent"
    dest: "/srv/www/{{ item }}/shared/alerts-lastsent"
    # Doing this because the src file might not yet exist and that's okay
    force: true
  with_items: "{{ environments }}"

# dependency for ansible mysql_db module handled in site.yml

- name: Install MySQL client dev headers, updating cache as needed
  apt:
    name: libmysqlclient-dev
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install OpenSSL
  apt:
    name: libssl-dev
    state: present

# NOTE - This works for both mysql 5 AND 8
- name: Create openaustralia databases
  mysql_db:
    login_host: "{{ db_host }}"
    login_user: admin
    login_password: "{{ rds_admin_password }}"
    name: "oa-{{ item }}"
  loop: "{{ environments }}"

- name: Create openaustralia mysql admin user with access to the databases
  mysql_user:
    login_host: "{{ db_host }}"
    login_user: admin
    login_password: "{{ rds_admin_password }}"
    name: oa-{{ item }}
    password: "{{ (item == 'production') | ternary(openaustralia_production_mysql_password, openaustralia_staging_mysql_password) }}"
    priv: "oa-{{ item }}.*:ALL"
    host: "%"
  loop: "{{ environments }}"

- name: Create mysql user with readonly access to the openaustralia databases for metabase
  mysql_user:
    login_host: "{{ db_host }}"
    login_user: admin
    login_password: "{{ rds_admin_password }}"
    name: "oa-{{ item }}-readonly"
    password: "{{ mysql_production_password_readonly }}"
    priv: 'oa-{{ item }}.*:SELECT'
    host: "%"
  loop: "{{ environments }}"

- name: Create .my.cnf in development with password for both production and staging
  template:
    src: mysql
    dest: /root/.my.cnf
    owner: root
    group: root
    mode: "0600"
  when: "'development' in group_names"

# Create fake let's encrypt directories when in development
- name: Create fake let's encrypt directories when in development
  file:
    state: directory
    path: "/etc/letsencrypt/live/{{ item }}"
    mode: '0755'
  with_items: "{{ apache_sites.values() | map(attribute='domain') | list }}"
  when: "'development' in group_names"

# We need to setup the SSL certificates before we try to configure nginx
# because otherwise nginx will try to look for non-existent certificates
- name: Copy SSL certificates for development
  copy:
    src: "{{ item }}.pem"
    # We're faking it as if these are let's encrypt certs. Makes for less magic config
    dest: "/etc/letsencrypt/live/{{ item }}/fullchain.pem"
    mode: 0644
  with_items: "{{ apache_sites.values() | map(attribute='domain') | list }}"
  # Only run this task when this machine is the development group
  when: "'development' in group_names"
  notify: reload apache

- name: Copy SSL keys for development
  copy:
    src: "{{ item }}.key"
    dest: "/etc/letsencrypt/live/{{ item }}/privkey.pem"
    mode: 0640
  with_items: "{{ apache_sites.values() | map(attribute='domain') | list }}"
  # Only run this task when this machine is the development group
  when: "'development' in group_names"
  notify: reload apache

- name: Install apache now (for the benefit of certbot)
  apt: pkg=apache2
  when: "'ec2' in group_names"

# Install php5 on xenial requires a few more jumps than usual
- name: Add repo for installing php5
  tags: xapian
  apt_repository:
    repo: 'ppa:ondrej/php'
    update_cache: true

- name: Add xapian backports PPA for newer libxapian
  tags: xapian
  apt_repository:
    repo: 'ppa:xapian/backports'
    update_cache: true

- name: Install required packages
  tags: xapian
  apt:
    name:
      - apache2
      - ghostscript
      - imagemagick
      - libdbd-mysql-perl
      - libdbi-perl
      - libmagickcore-dev
      - libmagickwand-dev
      - libmysqlclient-dev
      - libsearch-xapian-perl
      - libxml-rss-perl
      - libxml-simple-perl
      - libxml-twig-perl
      - libxslt1-dev
      - mysql-client
      - msmtp

# Pin the xapian library and tools to the upstream version declared in
# group_vars/openaustralia.yml. We compile xapian-bindings from source
# against these, so they must match the tarball version.
#
# Note: libsearch-xapian-perl is intentionally *not* pinned here. It
# comes from Ubuntu's main repos (currently 1.2.25.4-1build1 on prod),
# not from ppa:xapian/backports, and it's independent of the PHP
# bindings we build from source.
#
# Why "=1.4.22*" rather than the full "=1.4.22-1.999jammy+1":
# the PPA rebuilds the same upstream version with a different Debian
# revision per Ubuntu release (jammy, noble, ...). Pinning the full
# revision would silently break if this playbook ran against a
# host on a different distro. The glob pins only the upstream version
# (the part that needs to match the bindings tarball) and lets apt pick
# whatever revision the PPA published for the host's distro.
- name: Install xapian packages at pinned version
  tags: xapian
  apt:
    name:
      - "libxapian-dev={{ xapian_version }}*"
      - "xapian-tools={{ xapian_version }}*"
    state: present

- name: Install required packages for php
  tags: xapian
  when: "php_version is defined"
  apt:
    name:
      - libapache2-mod-php{{ php_version }}
      - php{{ php_version }}
      - php{{ php_version }}-curl
      - php{{ php_version }}-dev
      - php{{ php_version }}-mysql
      - php{{ php_version }}-mbstring
      - php{{ php_version }}-xml
      - php{{ php_version }}-zip

- name: Set default PHP version
  tags: xapian
  community.general.alternatives:
    name: php
    path: /usr/bin/php{{ php_version }}
    link: /usr/bin/php
  become: true

# FIXME: Do we really need libpq-dev ??

# xapian_version and xapian_bindings_sha256 are declared in
# group_vars/openaustralia.yml and apply to both the apt install above
# and the tarball download here.
- name: Download xapian bindings source
  tags: xapian
  get_url:
    url: https://oligarchy.co.uk/xapian/{{ xapian_version }}/xapian-bindings-{{ xapian_version }}.tar.xz
    dest: /home/deploy
    owner: deploy
    group: deploy
    checksum: "sha256:{{ xapian_bindings_sha256 }}"

- name: Unpack xapian bindings source
  tags: xapian
  unarchive:
      src: /home/deploy/xapian-bindings-{{ xapian_version }}.tar.xz
      dest: /home/deploy
      remote_src: true
      owner: deploy
      group: deploy
      creates: /home/deploy/xapian-bindings-{{ xapian_version }}/configure

- name: Configure xapian bindings
  tags: xapian
  command: ./configure --with-php
  args:
    chdir: /home/deploy/xapian-bindings-{{ xapian_version }}
    creates: /home/deploy/xapian-bindings-{{ xapian_version }}/Makefile
  become_user: deploy

- name: Compile xapian bindings
  tags: xapian
  command: make
  args:
    chdir: /home/deploy/xapian-bindings-{{ xapian_version }}
    creates: /home/deploy/xapian-bindings-{{ xapian_version }}/php/xapian.la
  become_user: deploy

- name: Install xapian bindings
  tags: xapian
  command: make install
  args:
    chdir: /home/deploy/xapian-bindings-{{ xapian_version }}
    creates: "/usr/lib/php/{{ php_api_version }}/xapian.so"
  notify: reload apache

- name: Create xapian mods-available ini
  tags: xapian
  copy:
    content: "extension=xapian.so\n"
    dest: /etc/php/{{ php_version }}/mods-available/xapian.ini
    mode: '0644'

- name: Enable xapian extension
  tags: xapian
  command: phpenmod xapian
  args:
    creates: /etc/php/{{ php_version }}/apache2/conf.d/20-xapian.ini
  notify: reload apache

- name: Enable apache modules
  apache2_module: state=present name={{ item }}
  notify: reload apache
  with_items:
    - expires
    - rewrite
    - ssl

- name: Copy across the php config
  tags: xapian
  when: "php_version is defined"
  template:
    src: php.ini
    dest: /etc/php/{{ php_version }}/{{ item }}/php.ini
    mode: '0644'
  notify: reload apache
  with_items:
    - apache2
    - cli

- name: Copy test/test password
  tags: htpasswd
  copy:
    src: htpasswd
    dest: /srv/www/{{ item }}/shared
    mode: '0640'
    owner: root
    group: www-data
  with_items: "{{ environments }}"
  notify: reload apache

- name: Install ssl-cert package (provides snakeoil certs)
  apt:
    name: ssl-cert
    state: present

- name: Use snakeoil cert as placeholder until Let's Encrypt runs
  shell: |
    domain="{{ item.value.domain }}"
    cert_dir="/etc/letsencrypt/live/${domain}"
    if [ ! -f "${cert_dir}/fullchain.pem" ]; then
      mkdir -p "${cert_dir}"
      ln -sf /etc/ssl/certs/ssl-cert-snakeoil.pem "${cert_dir}/fullchain.pem"
      ln -sf /etc/ssl/private/ssl-cert-snakeoil.key "${cert_dir}/privkey.pem"
      ln -sf /etc/ssl/certs/ssl-cert-snakeoil.pem "${cert_dir}/chain.pem"
    fi
  args:
    creates: "/etc/letsencrypt/live/{{ item.value.domain }}/fullchain.pem"
  when: item.key != '000-default'
  with_dict: "{{ apache_sites }}"

- name: Find latest certbot live dir for each domain
  tags: sites_available
  shell: |
    set -o pipefail
    (ls -d /etc/letsencrypt/live/{{ item.value.domain }}-[0-9]* 2>/dev/null || echo /etc/letsencrypt/live/{{ item.value.domain }}) | tail -1
  args:
    executable: /bin/bash
  register: certbot_live_dirs
  changed_when: false
  check_mode: no
  with_dict: "{{ apache_sites }}"
  when: item.key != '000-default'

- name: Build certbot_live_dir_map fact
  tags: sites_available
  set_fact:
    certbot_live_dir_map: >-
      {{ certbot_live_dir_map | default({}) |
         combine({item.item.value.domain: item.stdout | default('/etc/letsencrypt/live/' + item.item.value.domain)}) }}
  check_mode: no
  with_items: "{{ certbot_live_dirs.results }}"
  when: item.skipped is not defined

- name: Ensure each site has an apache configuration
  tags: sites_available
  template:
    src: "apache/{{ item.value.template | default(item.key) }}.conf"
    dest: "/etc/apache2/sites-available/{{ item.key}}.conf"
    mode: '0644'
  vars:
    stage: "{{ item.key }}"
    domain: "{{ item.value.domain }}"
    server_aliases: "{{ item.value.server_aliases }}"
    password_protect: "{{ item.value.password_protect | default(false) }}"
    newrelic_appname: "{{ item.value.newrelic_appname | default('OpenAustralia.org ' ~ item.key) }}"
  with_dict: "{{ apache_sites }}"
  notify: reload apache

- name: Enable virtual hosts
  file:
    src: /etc/apache2/sites-available/{{ item.key }}.conf
    dest: /etc/apache2/sites-enabled/{{ item.key }}.conf
    state: link
  with_dict: "{{ apache_sites }}"
  notify: reload apache

- name: Build certbot_certs from apache_sites
  set_fact:
    built_certbot_certs: >-
      {{ built_certbot_certs | default([]) +
         [{'email': certbot_email,
           'domains': [item.value.domain] + item.value.server_aliases}] }}
  when: item.key != '000-default'
  with_dict: "{{ apache_sites }}"

- name: Install certificate using certbot
  tags: broken
  when: "'ec2' in group_names"
  include_role:
    name: oaf.certbot
  vars:
    certbot_certs: "{{ built_certbot_certs }}"

- name: Copy across the application config
  template:
    src: general
    dest: "/srv/www/{{ item }}/shared"
    owner: deploy
    group: deploy
    mode: '0644'
  vars:
    db_password: "{{ apache_sites[item].db_password }}"
    stage: "{{ item }}"
    domain: "{{ apache_sites[item].domain }}"
  with_items: "{{ environments }}"
  notify: reload apache

- name: Copy across the parser config
  tags: parser_config
  template:
    src: parser_configuration.yml
    dest: "/srv/www/{{ item }}/shared"
    owner: deploy
    group: deploy
    mode: '0644'
  vars:
    stage: "{{ item }}"
  with_items: "{{ environments }}"

- name: Copy msmtp configuration
  tags: msmtp
  template:
    src: msmtprc
    dest: /etc/
    mode: '0644'

- name: "Ensure /usr/local/bin exists"
  file:
    path: /usr/local/bin
    owner: root
    group: root
    mode: 0755

