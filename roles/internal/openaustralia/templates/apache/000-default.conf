# {{ ansible_managed }}

# TODO: After migration make everything redirect to https
# Currently this is not the behaviour for openaustralia.org on kedumba so we should
# keep things the same until we're confident that everything is working after we've
# done the migration

# Redirect everything to the www subdomain
<VirtualHost *:80>
    RedirectMatch permanent ^/(.*) https://{{ domain }}/$1

    ErrorLog "/srv/www/production/log/default_redirect_error.log"
    CustomLog "/srv/www/production/log/default_redirect_access.log" combined
</VirtualHost>

<IfModule mod_ssl.c>
    <VirtualHost *:443>
        RedirectMatch permanent ^/(.*) https://{{ domain }}/$1

        SSLEngine on
        SSLCertificateKeyFile    /etc/letsencrypt/live/{{ domain }}/privkey.pem
        SSLCertificateFile       /etc/letsencrypt/live/{{ domain }}/fullchain.pem

        ErrorLog "/srv/www/production/log/default_redirect_error.log"
        CustomLog "/srv/www/production/log/default_redirect_access.log" combined
    </VirtualHost>
</IfModule>
