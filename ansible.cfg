[defaults]
roles_path=roles:roles/internal:roles/external
collections_path=collections/
remote_user = root
# The default behaviour is for handlers not to get called if a playbook fails
# for any reason. Make handlers get called
force_handlers = True

ansible_managed = Ansible managed - do not edit directly (the changes will be lost)!

### Vault passphrases
#
# Each vault id below is served by bin/ansible-vault-client, which reads
# the passphrase from the OAF 1Password account and falls back to the
# Keybase symlinks at the repo root for operators who haven't switched
# over yet. The Keybase fallback will be removed in a follow-up PR.
#
### Vault IDs:
#
# rtk - right-to-know secrets
#       Secrets used only by RightToKnow
# ec2 - secrets used by every service running in EC2
#       eg, AWS keys, the RDS hostnames
# all - secrets used across every OA service
#       Currently this includes default values for certbot and backups
# default - default ID used for things that haven't been split out
#           yet. Previously stored in .vault_pass.txt.

vault_identity_list = default@bin/ansible-vault-client,rtk@bin/ansible-vault-client,ec2@bin/ansible-vault-client,all@bin/ansible-vault-client

inventory = inventory

[ssh_connection]
pipelining = True
